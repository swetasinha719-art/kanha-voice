<!DOCTYPE html>
<html>
<head>
  <title>Kanha Voice</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
  <h3>Voice Rooms</h3>
  <button onclick="joinRoom('public')">Public</button>
  <button onclick="joinRoom('vip-room')">VIP</button>

</div>

<script src="app.js"></script>

</body>
</html>
